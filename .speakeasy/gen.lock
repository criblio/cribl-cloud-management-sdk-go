releaseNotes: |
  ## Go SDK Changes

  This version of the SDK is generated for Cribl.Cloud.

  ### API Credentials — IP allowlist

  Optional CIDR-based IP restrictions on API credentials: set on create and update; returned on list and get.

  * `CriblMgmtPlane.ApiCredentials.List()` — `response.Items[].IpAllowlist`
  * `CriblMgmtPlane.ApiCredentials.Create()` — `request.ApiCredentialCreateRequestDto.IpAllowlist`; `response.IpAllowlist`
  * `CriblMgmtPlane.ApiCredentials.Update()` — `request.ApiCredentialUpdateRequestDto.IpAllowlist`
  * `CriblMgmtPlane.ApiCredentials.Get()` — `response.IpAllowlist`
